<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Guess The Number</title>
  <link rel="shortcut icon" href="https://img.icons8.com/?size=100&id=2Tr028xYihcb&format=png&color=000000" type="image/x-icon">
  <link rel="stylesheet" href="style.css">
  <script defer src="script.js"></script>
</head>
<body>
  <div class="login-screen">
    <input class="login-input" type="text" autocomplete="off" autocorrect="off" autofocus>
    <button class="login-button">Login</button>
  </div>
  <header>
    <nav>
      <span class="home">Guess The Number</span>
      <span class="user-name">Hello User</span>
      <div class="theme">
        <div class="theme-circle"></div>
      </div>
    </nav>
  </header>

  <main>
    <div class="game">
      <div class="winning-effect"></div>

      <div class="lose-effect"></div>
      
      <div class="moves"></div>
      
      <div class="user-guess"></div>

      <div class="input">
        <input class="input-guess" type="number" inputmode="numeric" pattern="[0-9]*" autofocus autocorrect="off" autocomplete="off" placeholder="Enter your guess...">
      </div>

      <div class="enter">
        <button class="hit-me">Hit Me</button>
      </div>

            
      <div class="hint">
        <span>Guess a value between 1 to 100</span>
      </div>
    </div>
  </main>

  <footer>
    <span>Made by Human Mind 💀</span>
  </footer>
</body>
</html>
